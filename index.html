<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestureCam</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- CAMERA -->
<div id="camera-container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="skeleton-canvas"></canvas>

  <!-- SIMPLE HUD -->
  <div id="hud">

    <div id="ml-status" style="
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      font-family: monospace;
      font-size: 12px;
      z-index: 9999;
    ">
      Loading AI...
    </div>

    <div id="gesture-hud" style="
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: yellow;
      padding: 8px 12px;
      font-size: 18px;
      font-weight: bold;
      z-index: 9999;
      font-family: monospace;
    ">
      —
    </div>

    <div id="training-hud" style="
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: lime;
      padding: 6px 10px;
      font-family: monospace;
      font-size: 12px;
      z-index: 9999;
    ">
      TRAIN OFF
    </div>

  </div>
</div>

<!-- CONTROLS -->
<button id="train-btn" style="
  position: fixed;
  bottom: 10px;
  left: 10px;
  padding: 10px;
  z-index: 9999;
">
  TRAIN
</button>

<script type="module" src="./js/app.js?v=3"></script>

</body>
</html>
