<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GestureCam</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --cyan: #00E5FF;
    --cyan-dim: rgba(0,229,255,0.15);
    --dark: #0a0a0f;
    --panel: rgba(12,12,20,0.92);
    --border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.5);
    --danger: #FF3B3B;
    --success: #00E5A0;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #camera-container {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  #skeleton-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }

  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 16px;
  }

  #status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: auto;
  }

  .pill {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .dot.recording { background: var(--danger); animation: blink 0.8s ease-in-out infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #gesture-toast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px 32px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #gesture-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  #toast-emoji { font-size: 44px; line-height: 1; }
  #toast-label { font-size: 14px; font-weight: 600; margin-top: 6px; color: var(--cyan); }

  #confidence-hud {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #confidence-hud.visible { opacity: 1; }
  #conf-label { font-size: 13px; font-weight: 600; color: var(--cyan); }
  #conf-bar-track {
    width: 130px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  #conf-bar-fill {
    height: 100%;
    background: var(--cyan);
    border-radius: 2px;
    transition: width 0.15s;
  }
  #conf-pct { font-size: 11px; color: var(--text-dim); }

  #bottom-controls {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 0 0;
    pointer-events: auto;
  }

  .ctrl-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: transform 0.1s, background 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .ctrl-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.1); }

  #shutter {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid white;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    -webkit-user-select: none; user-select: none;
  }
  #shutter-inner {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: white;
    transition: background 0.15s, transform 0.1s;
  }
  #shutter:active #shutter-inner { transform: scale(0.88); background: #ddd; }
  #shutter.recording { border-color: var(--danger); }
  #shutter.recording #shutter-inner { background: var(--danger); border-radius: 10px; }

  #flash-overlay {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.08s;
  }
  #flash-overlay.flash { opacity: 1; }

  #zoom-bar {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    pointer-events: auto;
  }
  .zoom-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background 0.15s;
  }
  .zoom-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

  #bottom-panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 0;
    flex-shrink: 0;
  }

  #tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 12px 0 10px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    cursor: pointer;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  .tab-content { display: none; padding: 14px 16px 16px; }
  .tab-content.active { display: block; }

  #gestures-list { display: flex; flex-direction: column; gap: 8px; max-height: 180px; overflow-y: auto; }

  .gesture-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .gesture-emoji { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .gesture-info { flex: 1; min-width: 0; }
  .gesture-name { font-size: 13px; font-weight: 600; }
  .gesture-action { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
  .gesture-samples {
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .gesture-samples.trained { color: var(--success); }

  .record-btn {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .record-btn:active { background: rgba(255,255,255,0.1); }
  .record-btn.active { border-color: var(--danger); color: var(--danger); }

  #train-btn {
    width: 100%;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid var(--cyan);
    background: var(--cyan-dim);
    color: var(--cyan);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.15s;
  }
  #train-btn:active { background: rgba(0,229,255,0.25); }
  #train-btn:disabled { opacity: 0.4; cursor: default; }

  #train-status {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 8px;
    min-height: 18px;
  }

  #recording-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }
  #recording-overlay.active { display: flex; }

  #rec-pulse {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--danger);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    animation: pulse 0.7s ease-in-out infinite alternate;
  }
  @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.1)} }

  #rec-label { font-size: 18px; font-weight: 700; }
  #rec-sublabel { font-size: 13px; color: var(--text-dim); }
  #rec-progress-track {
    width: 200px; height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px; overflow: hidden;
  }
  #rec-progress-fill {
    height: 100%; background: var(--cyan); border-radius: 3px;
    transition: width 0.1s;
  }
  #rec-count { font-size: 13px; color: var(--text-dim); }
  #rec-cancel {
    padding: 8px 24px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.3);
    background: transparent;
    color: white;
    font-size: 13px;
    cursor: pointer;
  }

  #loading-screen {
    position: absolute;
    inset: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }
  #loading-screen.hidden { display: none; }
  .loader-title { font-size: 22px; font-weight: 700; letter-spacing: 0.05em; }
  .loader-sub { font-size: 13px; color: var(--text-dim); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #photos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    max-height: 200px;
    overflow-y: auto;
  }
  .photo-thumb {
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 4px;
    width: 100%;
    cursor: pointer;
  }
  #no-photos { font-size: 12px; color: var(--text-dim); text-align: center; padding: 20px 0; }

  #add-gesture-form {
    display: flex; gap: 8px; margin-top: 10px;
  }
  #new-gesture-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: white;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
  }
  #new-gesture-input:focus { border-color: var(--cyan); }
  #add-gesture-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="camera-container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="skeleton-canvas"></canvas>

  <div id="hud">
    <div id="status-bar">
      <div class="pill">
        <div class="dot" id="ml-dot"></div>
        <span id="ml-status">Loading AI...</span>
      </div>
      <div class="pill" id="zoom-pill">1x</div>
    </div>

    <div id="confidence-hud">
      <div id="conf-label">—</div>
      <div id="conf-bar-track"><div id="conf-bar-fill" style="width:0%"></div></div>
      <div id="conf-pct">—</div>
    </div>

    <div id="bottom-controls">
      <button class="ctrl-btn" id="gallery-btn" title="Gallery">🖼️</button>
      <div id="shutter" title="Take photo">
        <div id="shutter-inner"></div>
      </div>
      <button class="ctrl-btn" id="train-nav-btn" title="Gestures">🤖</button>
    </div>
  </div>

  <div id="zoom-bar">
    <button class="zoom-btn active" data-zoom="1">1×</button>
    <button class="zoom-btn" data-zoom="2">2×</button>
    <button class="zoom-btn" data-zoom="3">3×</button>
  </div>

  <div id="gesture-toast">
    <div id="toast-emoji">✌️</div>
    <div id="toast-label">Peace sign</div>
  </div>

  <div id="flash-overlay"></div>

  <div id="recording-overlay">
    <div id="rec-pulse">✊</div>
    <div id="rec-label">Recording samples</div>
    <div id="rec-sublabel">Hold your gesture steady</div>
    <div id="rec-progress-track"><div id="rec-progress-fill" style="width:0%"></div></div>
    <div id="rec-count">0 / 30</div>
    <button id="rec-cancel">Cancel</button>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="loader-title">GestureCam</div>
    <div class="loader-sub" id="loading-msg">Loading MediaPipe...</div>
  </div>
</div>

<div id="bottom-panel">
  <div id="tab-bar">
    <div class="tab active" data-tab="gestures">Gestures</div>
    <div class="tab" data-tab="photos">Photos</div>
  </div>

  <div class="tab-content active" id="tab-gestures">
    <div id="gestures-list"></div>
    <div id="add-gesture-form">
      <input id="new-gesture-input" placeholder="New gesture name..." maxlength="20">
      <button id="add-gesture-btn">+ Add</button>
    </div>
    <button id="train-btn" disabled>Train Model</button>
    <div id="train-status">Add samples to each gesture first</div>
  </div>

  <div class="tab-content" id="tab-photos">
    <div id="photos-grid"></div>
    <div id="no-photos">No photos yet — use a gesture or tap the shutter</div>
  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js";

const SAMPLES_NEEDED = 30;
const CONFIDENCE_THRESHOLD = 0.78;
const DEBOUNCE_MS = 1400;

const state = {
  handLandmarker: null,
  mlReady: false,
  videoReady: false,
  gestures: [
    { name: "peace", label: "Peace sign ✌️", emoji: "✌️", action: "photo", samples: [] },
    { name: "open_hand", label: "Open hand ✋", emoji: "✋", action: "record", samples: [] },
    { name: "thumbs_up", label: "Thumbs up 👍", emoji: "👍", action: "gallery", samples: [] },
    { name: "fist", label: "Fist ✊", emoji: "✊", action: "cancel", samples: [] },
  ],
  classifier: null,
  recording: null,
  lastGesture: null,
  lastGestureTime: 0,
  photos: [],
  isRecordingVideo: false,
  zoomLevel: 1,
  videoTrack: null,
  animFrame: null,
};

const $ = id => document.getElementById(id);
const video = $("video");
const canvas = $("skeleton-canvas");
const ctx = canvas.getContext("2d");

async function init() {
  $("loading-msg").textContent = "Starting camera...";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    state.videoTrack = stream.getVideoTracks()[0];
    await new Promise(r => video.addEventListener("loadedmetadata", r, { once: true }));
    state.videoReady = true;
  } catch (e) {
    $("loading-msg").textContent = "Camera error: " + e.message;
    return;
  }

  $("loading-msg").textContent = "Loading MediaPipe AI...";
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    state.handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1,
      minHandDetectionConfidence: 0.55,
      minHandPresenceConfidence: 0.55,
      minTrackingConfidence: 0.55,
    });
    state.mlReady = true;
    $("ml-dot").className = "dot active";
    $("ml-status").textContent = "AI ready";
  } catch (e) {
    $("loading-msg").textContent = "AI load failed: " + e.message;
    return;
  }

  loadFromStorage();
  renderGestureList();
  $("loading-screen").classList.add("hidden");
  detectLoop();
}

function normalizeFeatures(landmarks) {
  const flat = [];
  for (const lm of landmarks) { flat.push(lm.x, lm.y, lm.z); }
  const wx = flat[0], wy = flat[1], wz = flat[2];
  for (let i = 0; i < flat.length; i += 3) {
    flat[i] -= wx; flat[i+1] -= wy; flat[i+2] -= wz;
  }
  const maxVal = Math.max(...flat.map(Math.abs)) || 1;
  return flat.map(v => v / maxVal);
}

function detectLoop() {
  resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (state.mlReady && video.readyState >= 2) {
    const now = performance.now();
    const result = state.handLandmarker.detectForVideo(video, now);

    if (result.landmarks.length > 0) {
      const landmarks = result.landmarks[0];
      drawSkeleton(landmarks);
      const features = normalizeFeatures(landmarks);

      if (state.recording) {
        handleRecordingSample(features);
      } else if (state.classifier) {
        const pred = classify(features);
        if (pred && pred.confidence >= CONFIDENCE_THRESHOLD) {
          showConfidence(pred.label, pred.confidence);
          const now2 = Date.now();
          if (pred.label !== state.lastGesture || now2 - state.lastGestureTime > DEBOUNCE_MS) {
            state.lastGesture = pred.label;
            state.lastGestureTime = now2;
            triggerGestureAction(pred.label);
          }
        } else {
          hideConfidence();
        }
      } else {
        hideConfidence();
      }
    } else {
      hideConfidence();
      state.lastGesture = null;
    }
  }

  state.animFrame = requestAnimationFrame(detectLoop);
}

function resizeCanvas() {
  const rect = video.getBoundingClientRect();
  if (canvas.width !== rect.width || canvas.height !== rect.height) {
    canvas.width = rect.width;
    canvas.height = rect.height;
  }
}

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

function drawSkeleton(landmarks) {
  const w = canvas.width, h = canvas.height;
  ctx.strokeStyle = "rgba(0,229,255,0.7)";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  for (const [a, b] of CONNECTIONS) {
    ctx.beginPath();
    ctx.moveTo(landmarks[a].x * w, landmarks[a].y * h);
    ctx.lineTo(landmarks[b].x * w, landmarks[b].y * h);
    ctx.stroke();
  }
  const tips = new Set([4, 8, 12, 16, 20]);
  for (let i = 0; i < landmarks.length; i++) {
    const x = landmarks[i].x * w, y = landmarks[i].y * h;
    ctx.beginPath();
    ctx.arc(x, y, tips.has(i) ? 6 : 3.5, 0, Math.PI * 2);
    ctx.fillStyle = tips.has(i) ? "#00E5FF" : "white";
    ctx.fill();
  }
}

function showConfidence(label, confidence) {
  const g = state.gestures.find(g => g.name === label);
  const display = g ? g.label : label;
  $("conf-label").textContent = display;
  $("conf-bar-fill").style.width = (confidence * 100).toFixed(0) + "%";
  $("conf-pct").textContent = (confidence * 100).toFixed(0) + "%";
  $("confidence-hud").classList.add("visible");
}

function hideConfidence() {
  $("confidence-hud").classList.remove("visible");
}

function triggerGestureAction(gestureName) {
  const g = state.gestures.find(g => g.name === gestureName);
  if (!g) return;
  showToast(g.emoji, g.label);

  if (g.action === "photo") takePhoto();
  else if (g.action === "record") toggleRecord();
  else if (g.action === "gallery") switchTab("photos");
  else if (g.action === "cancel") { state.lastGesture = null; }
}

function showToast(emoji, label) {
  $("toast-emoji").textContent = emoji;
  $("toast-label").textContent = label;
  const toast = $("gesture-toast");
  toast.classList.add("show");
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove("show"), 1400);
}

function takePhoto() {
  const flash = $("flash-overlay");
  flash.classList.add("flash");
  setTimeout(() => flash.classList.remove("flash"), 120);

  const snap = document.createElement("canvas");
  snap.width = video.videoWidth;
  snap.height = video.videoHeight;
  const sctx = snap.getContext("2d");
  sctx.translate(snap.width, 0);
  sctx.scale(-1, 1);
  sctx.drawImage(video, 0, 0);

  const dataUrl = snap.toDataURL("image/jpeg", 0.92);
  state.photos.unshift(dataUrl);
  saveToStorage();
  renderPhotos();
  showToast("📸", "Photo saved!");
}

function toggleRecord() {
  state.isRecordingVideo = !state.isRecordingVideo;
  const shutter = $("shutter");
  if (state.isRecordingVideo) {
    shutter.classList.add("recording");
    $("ml-dot").className = "dot recording";
    $("ml-status").textContent = "Recording";
    showToast("🔴", "Recording started");
  } else {
    shutter.classList.remove("recording");
    $("ml-dot").className = "dot active";
    $("ml-status").textContent = "AI ready";
    showToast("⏹️", "Recording stopped");
  }
}

function handleRecordingSample(features) {
  state.recording.samples.push([...features]);
  const count = state.recording.samples.length;
  const pct = (count / SAMPLES_NEEDED * 100).toFixed(0);
  $("rec-progress-fill").style.width = pct + "%";
  $("rec-count").textContent = count + " / " + SAMPLES_NEEDED;

  if (count >= SAMPLES_NEEDED) {
    finishRecording();
  }
}

function startRecording(gestureName) {
  const g = state.gestures.find(g => g.name === gestureName);
  if (!g) return;
  state.recording = { name: gestureName, samples: [] };
  $("rec-pulse").textContent = g.emoji;
  $("rec-label").textContent = "Recording: " + g.label;
  $("rec-progress-fill").style.width = "0%";
  $("rec-count").textContent = "0 / " + SAMPLES_NEEDED;
  $("recording-overlay").classList.add("active");
}

function finishRecording() {
  const { name, samples } = state.recording;
  const g = state.gestures.find(g => g.name === name);
  if (g) g.samples = samples;
  state.recording = null;
  $("recording-overlay").classList.remove("active");
  saveToStorage();
  renderGestureList();
  updateTrainButton();
  $("train-status").textContent = `✓ ${samples.length} samples saved for "${name}". Train when ready.`;
}

function cancelRecording() {
  state.recording = null;
  $("recording-overlay").classList.remove("active");
}

function trainModel() {
  const trained = state.gestures.filter(g => g.samples.length >= SAMPLES_NEEDED);
  if (trained.length < 2) {
    $("train-status").textContent = "Need at least 2 gestures with 30 samples each";
    return;
  }

  $("train-btn").disabled = true;
  $("train-status").textContent = "Training...";

  setTimeout(() => {
    try {
      const labels = trained.map(g => g.name);
      const X = [], Y = [];
      trained.forEach((g, ci) => {
        g.samples.forEach(s => { X.push(s); Y.push(ci); });
      });

      const mlp = new MiniMLP(63, 96, 48, labels.length);
      const n = X.length;
      for (let epoch = 0; epoch < 120; epoch++) {
        const idx = shuffle(Array.from({length: n}, (_, i) => i));
        for (const i of idx) mlp.step(X[i], Y[i], 0.012);
      }

      state.classifier = { mlp, labels };
      saveToStorage();
      $("train-status").textContent = `✓ Model trained — ${labels.length} gestures, ${n} samples`;
      showToast("🧠", "Model ready!");
    } catch(e) {
      $("train-status").textContent = "Training failed: " + e.message;
    }
    $("train-btn").disabled = false;
  }, 50);
}

function classify(features) {
  if (!state.classifier) return null;
  const { mlp, labels } = state.classifier;
  const probs = mlp.predict(features);
  let maxIdx = 0;
  for (let i = 1; i < probs.length; i++) if (probs[i] > probs[maxIdx]) maxIdx = i;
  return { label: labels[maxIdx], confidence: probs[maxIdx] };
}

class MiniMLP {
  constructor(i, h1, h2, o) {
    this.i = i; this.h1 = h1; this.h2 = h2; this.o = o;
    this.w1 = randn(h1, i, Math.sqrt(2/i));
    this.b1 = new Float32Array(h1);
    this.w2 = randn(h2, h1, Math.sqrt(2/h1));
    this.b2 = new Float32Array(h2);
    this.w3 = randn(o, h2, Math.sqrt(2/h2));
    this.b3 = new Float32Array(o);
  }
  predict(x) {
    const h1 = relu(mvmul(this.w1, x, this.b1, this.h1, this.i));
    const h2 = relu(mvmul(this.w2, h1, this.b2, this.h2, this.h1));
    return softmax(mvmul(this.w3, h2, this.b3, this.o, this.h2));
  }
  step(x, target, lr) {
    const h1pre = mvmul(this.w1, x, this.b1, this.h1, this.i);
    const h1 = relu(h1pre);
    const h2pre = mvmul(this.w2, h1, this.b2, this.h2, this.h1);
    const h2 = relu(h2pre);
    const logits = mvmul(this.w3, h2, this.b3, this.o, this.h2);
    const probs = softmax(logits);

    const dL = probs.slice();
    dL[target] -= 1;

    const dW3 = outer(dL, h2, this.o, this.h2);
    const dH2 = mvmulT(this.w3, dL, this.h2, this.o);
    const dH2pre = dH2.map((v, i) => h2pre[i] > 0 ? v : 0);
    const dW2 = outer(dH2pre, h1, this.h2, this.h1);
    const dH1 = mvmulT(this.w2, dH2pre, this.h1, this.h2);
    const dH1pre = dH1.map((v, i) => h1pre[i] > 0 ? v : 0);
    const dW1 = outer(dH1pre, x, this.h1, this.i);

    updM(this.w3, dW3, lr, this.o, this.h2);
    updV(this.b3, dL, lr);
    updM(this.w2, dW2, lr, this.h2, this.h1);
    updV(this.b2, dH2pre, lr);
    updM(this.w1, dW1, lr, this.h1, this.i);
    updV(this.b1, dH1pre, lr);
  }
  toJSON() {
    return {
      i:this.i,h1:this.h1,h2:this.h2,o:this.o,
      w1:Array.from(this.w1),b1:Array.from(this.b1),
      w2:Array.from(this.w2),b2:Array.from(this.b2),
      w3:Array.from(this.w3),b3:Array.from(this.b3),
    };
  }
  static fromJSON(j) {
    const m = new MiniMLP(j.i,j.h1,j.h2,j.o);
    m.w1=new Float32Array(j.w1); m.b1=new Float32Array(j.b1);
    m.w2=new Float32Array(j.w2); m.b2=new Float32Array(j.b2);
    m.w3=new Float32Array(j.w3); m.b3=new Float32Array(j.b3);
    return m;
  }
}

function randn(rows, cols, scale) {
  const a = new Float32Array(rows * cols);
  for (let i = 0; i < a.length; i++) {
    let u = 0, v = 0;
    while (!u) u = Math.random();
    while (!v) v = Math.random();
    a[i] = Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v) * scale;
  }
  return a;
}
function mvmul(W, x, b, rows, cols) {
  const out = new Float32Array(rows);
  for (let i = 0; i < rows; i++) {
    let s = b[i];
    const off = i * cols;
    for (let j = 0; j < cols; j++) s += W[off+j] * x[j];
    out[i] = s;
  }
  return out;
}
function mvmulT(W, x, outSize, inSize) {
  const out = new Float32Array(outSize);
  for (let j = 0; j < outSize; j++) {
    let s = 0;
    for (let i = 0; i < inSize; i++) s += W[i * outSize + j] * x[i];
    out[j] = s;
  }
  return out;
}
function outer(a, b, ra, cb) {
  const m = new Float32Array(ra * cb);
  for (let i = 0; i < ra; i++) for (let j = 0; j < cb; j++) m[i*cb+j] = a[i]*b[j];
  return m;
}
function updM(W, dW, lr, rows, cols) { for (let i = 0; i < rows*cols; i++) W[i] -= lr*dW[i]; }
function updV(b, db, lr) { for (let i = 0; i < b.length; i++) b[i] -= lr*db[i]; }
function relu(x) { return x.map(v => Math.max(0, v)); }
function softmax(x) {
  const max = Math.max(...x);
  const e = x.map(v => Math.exp(v - max));
  const s = e.reduce((a,b) => a+b, 0);
  return e.map(v => v/s);
}
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function renderGestureList() {
  const list = $("gestures-list");
  list.innerHTML = "";
  state.gestures.forEach(g => {
    const row = document.createElement("div");
    row.className = "gesture-row";
    const trained = g.samples.length >= SAMPLES_NEEDED;
    row.innerHTML = `
      <div class="gesture-emoji">${g.emoji}</div>
      <div class="gesture-info">
        <div class="gesture-name">${g.label}</div>
        <div class="gesture-action">${actionLabel(g.action)}</div>
      </div>
      <div class="gesture-samples ${trained ? "trained" : ""}">${g.samples.length}/${SAMPLES_NEEDED}</div>
      <button class="record-btn" data-name="${g.name}">${g.samples.length > 0 ? "Retrain" : "Record"}</button>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll(".record-btn").forEach(btn => {
    btn.addEventListener("click", () => startRecording(btn.dataset.name));
  });
  updateTrainButton();
}

function actionLabel(action) {
  return { photo:"📸 Take photo", record:"🎥 Start/stop video", gallery:"🖼️ Open gallery", cancel:"✖ Cancel" }[action] || action;
}

function updateTrainButton() {
  const ready = state.gestures.filter(g => g.samples.length >= SAMPLES_NEEDED).length;
  const btn = $("train-btn");
  btn.disabled = ready < 2;
  if (ready < 2) {
    $("train-status").textContent = `${ready} of 2 gestures have enough samples`;
  } else {
    $("train-status").textContent = `${ready} gestures ready — tap to train`;
  }
}

function renderPhotos() {
  const grid = $("photos-grid");
  const none = $("no-photos");
  if (state.photos.length === 0) {
    grid.style.display = "none";
    none.style.display = "block";
    return;
  }
  none.style.display = "none";
  grid.style.display = "grid";
  grid.innerHTML = "";
  state.photos.slice(0, 30).forEach(url => {
    const img = document.createElement("img");
    img.className = "photo-thumb";
    img.src = url;
    img.addEventListener("click", () => {
      const a = document.createElement("a");
      a.href = url;
      a.download = "gesturecam_" + Date.now() + ".jpg";
      a.click();
    });
    grid.appendChild(img);
  });
}

function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll(".tab-content").forEach(c => c.classList.toggle("active", c.id === "tab-" + name));
}

function saveToStorage() {
  try {
    const data = {
      gestures: state.gestures.map(g => ({ ...g, samples: g.samples })),
      classifier: state.classifier ? {
        labels: state.classifier.labels,
        mlp: state.classifier.mlp.toJSON()
      } : null,
      photos: state.photos.slice(0, 20)
    };
    localStorage.setItem("gesturecam_v1", JSON.stringify(data));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem("gesturecam_v1");
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.gestures) state.gestures = data.gestures;
    if (data.classifier) {
      state.classifier = {
        labels: data.classifier.labels,
        mlp: MiniMLP.fromJSON(data.classifier.mlp)
      };
      $("train-status").textContent = "✓ Trained model loaded";
    }
    if (data.photos) state.photos = data.photos;
    renderPhotos();
  } catch(e) {}
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => switchTab(tab.dataset.tab));
});

$("shutter").addEventListener("click", takePhoto);
$("train-nav-btn").addEventListener("click", () => switchTab("gestures"));
$("gallery-btn").addEventListener("click", () => switchTab("photos"));
$("train-btn").addEventListener("click", trainModel);
$("rec-cancel").addEventListener("click", cancelRecording);

document.querySelectorAll(".zoom-btn").forEach(btn => {
  btn.addEventListener("click", async () => {
    document.querySelectorAll(".zoom-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const z = parseFloat(btn.dataset.zoom);
    $("zoom-pill").textContent = z + "x";
    state.zoomLevel = z;
    if (state.videoTrack) {
      try {
        const caps = state.videoTrack.getCapabilities();
        if (caps.zoom) {
          const min = caps.zoom.min || 1;
          const max = caps.zoom.max || 1;
          const target = min + (z - 1) / 2 * (max - min);
          await state.videoTrack.applyConstraints({ advanced: [{ zoom: Math.min(target, max) }] });
        }
      } catch(e) {}
    }
  });
});

$("add-gesture-btn").addEventListener("click", () => {
  const input = $("new-gesture-input");
  const name = input.value.trim();
  if (!name) return;
  const key = name.toLowerCase().replace(/\s+/g, "_");
  if (state.gestures.find(g => g.name === key)) return;
  state.gestures.push({ name: key, label: name, emoji: "🤚", action: "photo", samples: [] });
  input.value = "";
  renderGestureList();
  saveToStorage();
});

init();
</script>
