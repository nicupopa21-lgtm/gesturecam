<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestureCam</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="camera-container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="skeleton-canvas"></canvas>

  <div id="hud">
    <div id="status-bar">
      <div class="pill">
        <div class="dot" id="ml-dot"></div>
        <span id="ml-status">Loading AI...</span>
      </div>
      <div class="pill" id="zoom-pill">1x</div>
    </div>

    <div id="confidence-hud">
      <div id="conf-label">—</div>
      <div id="conf-bar-track"><div id="conf-bar-fill"></div></div>
      <div id="conf-pct">—</div>
    </div>

    <div id="bottom-controls">
      <button id="gallery-btn">🖼️</button>
      <div id="shutter"><div id="shutter-inner"></div></div>
      <button id="train-nav-btn">🤖</button>
    </div>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <div>Loading GestureCam...</div>
  </div>
</div>

<div id="bottom-panel">
  <div id="tab-bar">
    <div class="tab active" data-tab="gestures">Gestures</div>
    <div class="tab" data-tab="photos">Photos</div>
  </div>

  <div class="tab-content active" id="tab-gestures">
    <div id="gestures-list"></div>
    <button id="train-btn" disabled>Train Model</button>
    <div id="train-status"></div>
  </div>

  <div class="tab-content" id="tab-photos">
    <div id="photos-grid"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
