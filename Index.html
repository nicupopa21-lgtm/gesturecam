<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>GestureCam Lite</title>

<style>
body {
  margin: 0;
  background: #0a0a0f;
  color: white;
  font-family: system-ui;
  overflow: hidden;
}

#wrap {
  position: relative;
  height: 100vh;
  width: 100vw;
  background: black;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  transform: scaleX(-1);
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

.pill {
  background: rgba(0,0,0,0.6);
  padding: 6px 10px;
  border-radius: 999px;
}

#toast {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 10px 16px;
  border-radius: 12px;
  display: none;
}
</style>
</head>

<body>

<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div class="pill" id="status">Starting...</div>
    <div class="pill" id="gesture">—</div>
  </div>

  <div id="toast"></div>
</div>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const status = document.getElementById("status");
const gestureBox = document.getElementById("gesture");
const toast = document.getElementById("toast");

let landmarker;
let last = "";

function showToast(t){
  toast.innerText = t;
  toast.style.display = "block";
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toast.style.display="none", 1000);
}

async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
}

function resize(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
}

function draw(landmarks){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const w = canvas.width, h = canvas.height;

  for(const p of landmarks){
    ctx.beginPath();
    ctx.arc(p.x*w, p.y*h, 4, 0, Math.PI*2);
    ctx.fillStyle = "#00e5ff";
    ctx.fill();
  }
}

function simpleGesture(lm){
  const thumb = lm[4];
  const index = lm[8];

  if(thumb.y < index.y - 0.1) return "👍";
  if(index.y < lm[6].y && lm[12].y > lm[10].y) return "✌️";
  if(index.y > lm[0].y + 0.2) return "✊";
  return "🤚";
}

async function initAI(){
  status.innerText = "Loading AI...";

  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );

  landmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float32/1/hand_landmarker.task",
      delegate: "CPU"
    },
    runningMode: "VIDEO",
    numHands: 1
  });

  status.innerText = "AI Ready";
}

function loop(){
  if(video.readyState >= 2 && landmarker){
    resize();

    const res = landmarker.detectForVideo(video, performance.now());

    if(res.landmarks?.length){
      const lm = res.landmarks[0];
      draw(lm);

      const g = simpleGesture(lm);

      gestureBox.innerText = g;

      if(g !== last){
        last = g;
        showToast(g);
      }
    }
  }

  requestAnimationFrame(loop);
}

async function start(){
  try {
    await startCamera();
    await initAI();
    loop();
  } catch(e){
    status.innerText = "Error: " + e.message;
  }
}

start();
</script>

</body>
</html>
